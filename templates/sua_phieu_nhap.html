{% extends 'base.html' %}

{% block title %}Sửa Phiếu Nhập Kho - ALEX Paint System{% endblock %}

{% block content %}
<style>
    .phieu-view-container {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
        background-color: transparent; /* Trong suốt */
        display: flex;
        justify-content: center;
        padding: 20px;
        min-height: calc(100vh - 60px);
    }

    .phieu-view-modal {
        background: #ffffff;
        width: 860px;
        border: 1px solid #777;
        position: relative;
        padding-bottom: 50px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .phieu-view-header {
        text-align: center;
        padding: 22px 0 18px 0;
    }
    .phieu-view-header h2 {
        font-size: 17px;
        font-weight: 700;
        color: #000;
        margin: 0;
        font-family: Arial, sans-serif;
    }
    .btn-close-view {
        position: absolute;
        top: 15px; right: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #000;
        cursor: pointer;
        background: none;
        border: none;
        text-decoration: none;
    }

    .info-box-view {
        background-color: #e8e8e8;
        border: 1px solid #777;
        margin: 0 20px 15px 20px;
        padding: 16px 20px 24px 20px;
    }
    .info-box-view h3 {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 16px;
        color: #000;
        margin-top: 0;
    }

    .info-grid-view {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px 40px;
    }

    .form-group-view {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
    }
    .form-group-view label {
        font-size: 12px;
        color: #000;
        padding-top: 6px;
        white-space: nowrap;
    }

    .input-control-view {
        width: 250px;
        border: 1px solid #5a5eb9;
        outline: none;
        font-size: 13px;
        padding: 0 6px;
        background-color: #fff;
        color: #000;
        text-align: right;
    }
    input.input-control-view { height: 26px; }
    textarea.input-control-view { height: 50px; resize: none; padding: 6px; }

    .disabled-bg-view { background-color: #cecece; pointer-events: none; }

    .data-table-view {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 45px;
    }
    .data-table-view th {
        background-color: #eeeeee;
        font-size: 12px;
        font-weight: 700;
        padding: 12px 5px;
        text-align: center;
        border: none;
        color: #000;
    }
    .data-table-view td { padding: 18px 5px; text-align: center; }

    .cell-line-input {
        border: none;
        border-bottom: 1px solid #000;
        padding: 4px 0;
        font-size: 13px;
        color: #000;
        text-align: center;
        width: 100%;
        background: transparent;
        outline: none;
    }
    .cell-line-input:focus {
        border-bottom: 2px solid #5a5eb9;
    }

    .total-wrapper-phieu {
        display: flex;
        justify-content: flex-end;
        padding: 0 35px;
    }
    .total-box-phieu {
        background-color: #e8e8e8;
        border-radius: 15px;
        width: 320px;
        display: flex;
        justify-content: space-between;
        padding: 8px 25px;
        font-weight: 700;
        font-size: 15px;
        color: #000;
    }

    .action-row-view { display: flex; justify-content: flex-end; padding: 0 20px; margin-top: 20px; }
    .btn-save-view {
        background-color: #0b00a8;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 35px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
    }
    .btn-save-view:hover { background-color: #080080; color: white; }
</style>

<div class="phieu-view-container">
    <div class="phieu-view-modal">
        <a href="{% url 'nhap_kho' %}" class="btn-close-view">X</a>

        <div class="phieu-view-header">
            <h2>PHIẾU NHẬP KHO</h2>
        </div>

        <div class="info-box-view">
            <h3>Thông tin chung</h3>
            <div class="info-grid-view">
                <div class="col-left">
                    <div class="form-group-view" style="margin-bottom: 15px;">
                        <label>Tên NCC</label>
                        <input type="text" class="input-control-view" value="Nhà cung cấp A">
                    </div>
                    <div class="form-group-view" style="margin-bottom: 15px;">
                        <label>Mã NCC</label>
                        <input type="text" class="input-control-view" value="NCCA_9843">
                    </div>
                    <div class="form-group-view" style="margin-bottom: 15px;">
                        <label>Số điện thoại</label>
                        <input type="text" class="input-control-view" value="0985424661">
                    </div>
                    <div class="form-group-view">
                        <label>Địa chỉ</label>
                        <textarea class="input-control-view">446 Minh Khai, p. Vĩnh Tuy, q2, HCM.</textarea>
                    </div>
                </div>
                <div class="col-right">
                    <div class="form-group-view" style="margin-bottom: 15px;">
                        <label>Mã phiếu</label>
                        <input type="text" class="input-control-view disabled-bg-view" readonly value="NK000001">
                    </div>
                    <div class="form-group-view">
                        <label>Lý do</label>
                        <textarea class="input-control-view">Hàng mới về tháng 11</textarea>
                    </div>
                </div>
            </div>
        </div>

        <table class="data-table-view">
            <thead>
                <tr>
                    <th style="width: 60px;">STT</th><th style="width: 170px;">Tên hàng hóa</th><th style="width: 110px;">Mã hàng</th><th style="width: 90px;">Đơn vị<br>tính</th><th style="width: 110px;">Đơn giá</th><th style="width: 90px;">Số lượng</th><th style="width: 130px;">Thành tiền</th>
                </tr>
            </thead>
            <tbody id="edit-table-body">
                <tr>
                    <td><input type="text" class="cell-line-input" value="1" style="width: 35px;"></td>
                    <td><input type="text" class="cell-line-input" value="Sơn Alex - Màu ABC"></td>
                    <td><input type="text" class="cell-line-input" value="XXXXX" style="width: 75px;"></td>
                    <td><input type="text" class="cell-line-input" value="Thùng" style="width: 50px;"></td>
                    <td><input type="text" class="cell-line-input don-gia-edit" value="30.000.000" style="width: 85px;"></td>
                    <td><input type="text" class="cell-line-input so-luong-edit" value="10" style="width: 50px;"></td>
                    <td><input type="text" class="cell-line-input thanh-tien-edit" value="300.000.000" style="width: 95px;" readonly></td>
                </tr>
            </tbody>
        </table>

        <div class="total-wrapper-phieu"><div class="total-box-phieu"><span>TỔNG TIỀN:</span><span id="tong-tien-edit">300.000.000 đ</span></div></div>
        <div class="action-row-view"><a href="{% url 'nhap_kho' %}" class="btn-save-view">Lưu</a></div>
    </div>
</div>

<script>
    document.getElementById('edit-table-body').addEventListener('input', function(e) {
        if (e.target.classList.contains('don-gia-edit') || e.target.classList.contains('so-luong-edit')) {
            const row = e.target.closest('tr');
            const dg = parseInt(row.querySelector('.don-gia-edit').value.replace(/\./g, '')) || 0;
            const sl = parseInt(row.querySelector('.so-luong-edit').value) || 0;
            row.querySelector('.thanh-tien-edit').value = (dg * sl).toLocaleString('vi-VN');
            let total = 0; document.querySelectorAll('.thanh-tien-edit').forEach(i => { total += parseInt(i.value.replace(/\./g, '')) || 0; });
            document.getElementById('tong-tien-edit').innerText = total.toLocaleString('vi-VN') + ' đ';
        }
    });
</script>
{% endblock %}
